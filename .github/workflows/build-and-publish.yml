name: 构建并发布 Docker 镜像

# 仅支持手动触发
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（例如: latest, v1.0.0）'
        required: false
        default: 'latest'
        type: string
      push_image:
        description: '是否推送镜像到 Registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  # 镜像名称会自动转为小写（GitHub 要求）
  IMAGE_NAME: ${{ github.repository_owner }}/musicdl-panel

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest

    # 授予 GITHUB_TOKEN 写入 packages 的权限
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 检出代码（含 submodule）
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 设置 QEMU + Docker Buildx（支持多平台构建和缓存）
      - name: 设置 QEMU（多平台交叉编译）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 GitHub Container Registry
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      #  完整版镜像（full）
      # ============================================================

      # 4a. 提取完整版镜像元数据
      - name: 提取完整版镜像元数据
        id: meta-full
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=,format=short

      # 5a. 构建并推送完整版镜像
      - name: 构建并推送完整版镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: http_server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta-full.outputs.tags }}
          labels: ${{ steps.meta-full.outputs.labels }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,scope=full,mode=max

      # ============================================================
      #  精简版镜像（tiny）
      # ============================================================

      # 4b. 提取精简版镜像元数据
      - name: 提取精简版镜像元数据
        id: meta-tiny
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}-tiny
            type=sha,prefix=,suffix=-tiny,format=short

      # 5b. 构建并推送精简版镜像
      - name: 构建并推送精简版镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: http_server/Dockerfile.tiny
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta-tiny.outputs.tags }}
          labels: ${{ steps.meta-tiny.outputs.labels }}
          cache-from: type=gha,scope=tiny
          cache-to: type=gha,scope=tiny,mode=max

      # ============================================================
      #  构建摘要
      # ============================================================

      # 6. 输出镜像信息
      - name: 输出镜像信息
        run: |
          echo "### 🐳 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 完整版（42 源，~460MB）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-full.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 精简版（39 源，~149MB，无 YouTube/TIDAL/Apple）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-tiny.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**是否推送:** ${{ inputs.push_image }}" >> $GITHUB_STEP_SUMMARY
