name: 构建并发布 Docker 镜像

# 仅支持手动触发
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（例如: latest, v1.0.0）'
        required: false
        default: 'latest'
        type: string
      push_image:
        description: '是否推送镜像到 Registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  # 镜像名称会自动转为小写（GitHub 要求）
  IMAGE_NAME: ${{ github.repository_owner }}/musicdl-web

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest

    # 授予 GITHUB_TOKEN 写入 packages 的权限
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 检出代码（含 submodule）
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 设置 Docker Buildx（支持多平台构建和缓存）
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 GitHub Container Registry
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 提取镜像元数据（标签、标注等）
      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=,format=short

      # 5. 构建并推送镜像
      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: http_server/Dockerfile
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. 输出镜像信息
      - name: 输出镜像信息
        run: |
          echo "### 🐳 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**是否推送:** ${{ inputs.push_image }}" >> $GITHUB_STEP_SUMMARY
